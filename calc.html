<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <title>Basic calculator</title>
</head>
<body>
    <div class="calc_body">
    
        <input type="text" id="display">

    <button id="btnAC">AC</button>
    <button id="btnBRACKET">()</button>
    <button id="btnPERCENT">%</button>
    <button id="btnDIV">/</button><br>
    <button id="btn7">7</button>
    <button id="btn8">8</button>
    <button id="btn9">9</button>
    <button id="btnMULTIPLY">*</button><br>
    <button id="btn4">4</button>
    <button id="btn5">5</button>
    <button id="btn6">6</button>
    <button id="btnMINUS">-</button><br>
    <button id="btn1">1</button>
    <button id="btn2">2</button>
    <button id="btn3">3</button>
    <button id="btnPLUS">+</button><br>
     <button id="btnsin">SIN</button>
     <button id="btncos">COS</button>
     <button id="btntan">TAN</button>
     <button id="btnSQU">^</button>
      <button id="btn0">0</button>
    <button id="btnDOT">.</button>
    <button id="btnCLEAR">CLEAR</button>
    <button id="btnEQUAL">=</button>
    </div>
    <script src="calc.js"></script>
</body>
</html>
